/* preview page for html */
<!DOCTYPE html>
<html>
<head>
  <title>Resume Preview</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      padding: 30px;
    }

    .resume {
      max-width: 900px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1, h2, h3 {
      margin-bottom: 8px;
    }

    p {
      margin: 5px 0;
      color: #555;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 15px 0;
    }

    /* ===== TEMPLATE 1 (Classic Simple) ===== */
    .simple {
      background: #fff;
      color: #000;
      padding: 40px;
      font-family: 'Arial', sans-serif;
      text-align: left;
    }
    .simple h1 {
      font-size: 38px;
      font-weight: normal;
      margin-bottom: 5px;
      text-align: left;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .simple .contact-info {
      font-size: 13px;
      margin-bottom: 25px;
      text-align: left;
    }
    .simple .section-title {
      font-size: 15px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 25px;
      margin-bottom: 8px;
      border-bottom: 1px solid #000;
      padding-bottom: 3px;
      color: #000;
    }
    .simple .item-header {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
    }
    .simple .item-title {
      font-weight: bold;
    }
    .simple .item-date {
      font-weight: bold;
    }
    .simple .item-subtitle {
      font-style: italic;
      font-size: 14px;
      margin-bottom: 5px;
    }
    .simple .item-desc {
      font-size: 13px;
      margin-top: 5px;
      margin-bottom: 10px;
      padding-left: 20px;
    }
    .simple .item-desc li {
      margin-bottom: 4px;
    }
    .simple .skills-text {
      font-size: 14px;
      margin-top: 10px;
      line-height: 1.6;
    }

    /* ===== TEMPLATE 2 (Minimalist Modern) ===== */
    .modern {
      background: #fff;
      color: #333;
      padding: 40px;
      font-family: 'Times New Roman', Georgia, serif;
    }
    .modern h1 {
      font-size: 44px;
      font-weight: bold;
      margin-bottom: 5px;
      text-transform: capitalize;
      line-height: 1.1;
    }
    .modern .profession-title {
      font-size: 15px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 25px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .modern .contact-bar {
      display: flex;
      justify-content: space-between;
      border-top: 2px solid #555;
      border-bottom: 2px solid #555;
      padding: 12px 0;
      margin-bottom: 35px;
      font-size: 13px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .modern .section-heading {
      font-size: 17px;
      font-weight: bold;
      text-transform: uppercase;
      margin-top: 25px;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }
    .modern .job-date {
      font-size: 13px;
      margin-bottom: 4px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .modern .job-title {
      font-size: 15px;
      margin-bottom: 10px;
    }
    .modern .job-desc {
      font-size: 14px;
      line-height: 1.6;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin-bottom: 15px;
      color: #444;
    }
    .modern .divider {
      width: 100px;
      border-top: 1px solid #777;
      margin: 25px 0;
    }
    .modern .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      font-size: 14px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ===== TEMPLATE 3 (Corporate Professional) ===== */
    .professional {
      display: flex;
      padding: 0;
      color: #333;
      border-radius: 0;
    }

    .professional .left {
      width: 35%;
      background-color: #28323c;
      color: #fff;
      padding: 40px 20px;
      text-align: center;
    }

    .professional .left h1 {
      color: #fff;
      font-size: 24px;
      margin-top: 15px;
      margin-bottom: 5px;
      border: none;
      padding-bottom: 0;
    }

    .professional .left .profession-title {
      color: #6c98c6;
      font-size: 16px;
      margin-bottom: 30px;
    }

    .professional .left .photo-container {
      width: 150px;
      height: 150px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 3px solid #6c98c6;
      overflow: hidden;
      background: #eee;
    }
    .professional .left .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .professional .left .section {
      text-align: left;
      margin-top: 30px;
    }

    .professional .left .section h3 {
      font-size: 18px;
      border-bottom: 2px solid #555;
      padding-bottom: 5px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .professional .left .info-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .professional .left ul {
      list-style-type: circle;
      padding-left: 20px;
      font-size: 14px;
    }
    .professional .left ul li {
      margin-bottom: 8px;
    }

    .professional .right {
      width: 65%;
      background-color: #fff;
      padding: 40px;
    }

    .professional .right h2 {
      font-size: 22px;
      color: #222;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
      margin-bottom: 15px;
      margin-top: 30px;
      text-transform: uppercase;
    }

    .professional .right h2:first-child {
      margin-top: 0;
    }

    .professional .right p {
      font-size: 14px;
      line-height: 1.6;
    }

    .professional .right .job, .professional .right .degree {
      margin-top: 20px;
    }
    .professional .right .job-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }
    .professional .right .job-title {
      font-weight: bold;
      font-size: 16px;
      color: #111;
    }
    .professional .right .job-company {
      font-style: italic;
      color: #555;
      font-size: 14px;
    }
    .professional .right .job-date {
      font-size: 13px;
      color: #777;
    }
    .professional .right ul {
      margin-top: 10px;
      padding-left: 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== TEMPLATE 4 (Emily) ===== */
    .template4 { display: flex; color: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .template4 .left { width: 35%; background-color: #d8c1b0; padding: 40px 25px; } 
    .template4 .right { width: 65%; background-color: #fff; padding: 40px; }
    .template4 .photo-container { width: 140px; height: 140px; border-radius: 50%; overflow: hidden; margin: 0 auto 30px; object-fit: cover; }
    .template4 .photo-container img { width: 100%; height: 100%; object-fit: cover; }
    .template4 .left h2 { font-size: 18px; text-transform: capitalize; font-weight: bolder; margin-top: 25px; margin-bottom: 10px; }
    .template4 .left p, .template4 .left ul { font-size: 13px; line-height: 1.5; font-weight: 500;}
    .template4 .left ul { padding-left: 15px; margin-top: 5px; }
    .template4 .contact-item { margin-bottom: 10px; font-size: 13px; font-weight: 500; }
    .template4 .right h1 { font-size: 40px; font-weight: 300; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
    .template4 .right h1 span { font-weight: bold; }
    .template4 .right .profession { font-size: 20px; font-weight: bolder; margin-top: 5px; margin-bottom: 30px; letter-spacing: 1px; }
    .template4 .right .section-title { font-size: 22px; font-weight: 400; border-bottom: 1px solid #aaa; padding-bottom: 5px; margin: 25px 0 15px; }
    .template4 .job-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 15px; margin-bottom: 3px; }
    .template4 .job-sub { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 8px; }
    .template4 .right p, .template4 .right ul { font-size: 13px; line-height: 1.5; font-weight: 500; }
    .template4 .right ul { padding-left: 20px; margin-top: 5px; }

    /* ===== TEMPLATE 5 (Rhoda) ===== */
    .template5 { display: flex; color: #333; font-family: 'Arial', sans-serif; }
    .template5 .left { width: 33%; background-color: #fbf6f6; padding: 40px 25px; } /* Light pink/grey */
    .template5 .right { width: 67%; background-color: #fff; padding: 40px; }
    .template5 h1 { font-size: 32px; font-weight: bold; text-transform: uppercase; margin: 0; line-height: 1.2; letter-spacing: 1px; }
    .template5 .profession-badge { display: inline-block; background: #ffcccc; color: #cc3333; padding: 5px 10px; border-radius: 15px; font-weight: bold; font-size: 15px; margin: 15px 0 35px; text-transform: uppercase;}
    .template5 .section-title { font-size: 16px; font-weight: bold; color: #333; margin-top: 35px; margin-bottom: 15px; display: flex; align-items:center;}
    .template5 .section-title.red { color: #cc3333; font-size: 18px; text-transform: uppercase;}
    .template5 .section-title span { background: #ffcccc; width:25px; height:25px; line-height:25px; text-align:center; border-radius: 50%; margin-right: 10px; font-size: 12px; }
    .template5 .left p, .template5 .left ul { font-size: 14px; line-height: 1.6; }
    .template5 .left ul { padding-left: 20px; }
    .template5 .left .degree { font-size: 14px; color: #555; }
    .template5 .left .school { color: #cc3333; font-weight: bold; font-size: 14px; margin-top:3px;}
    .template5 .left .contact-item { margin-bottom: 8px; color: #555; font-size: 14px; }
    .template5 .right .job-title { font-size: 16px; font-weight: bold; margin-bottom: 3px; }
    .template5 .right .company { color: #cc3333; font-weight: bold; font-size: 15px; margin-bottom: 8px; }
    .template5 .right .job-date-loc { font-size: 13px; color: #888; margin-bottom: 10px; display: flex; gap: 20px;}
    .template5 .right p, .template5 .right ul { font-size: 14px; line-height: 1.6; color: #444; }
    .template5 .right ul { padding-left: 20px; margin-top: 5px; margin-bottom: 30px; }
    .template5 .right ul li { margin-bottom: 8px; }

    /* ===== TEMPLATE 6 (Kaida) ===== */
    .template6 { background: #fff; padding: 40px; color: #333; font-family: 'Segoe UI', Arial, sans-serif; }
    .template6 .header { text-align: left; margin-bottom: 35px; }
    .template6 .header h1 { font-size: 44px; text-transform: uppercase; margin: 0; font-weight: 900; letter-spacing: -1px; }
    .template6 .header .profession { font-size: 22px; color: #ff7f66; font-weight: bold; margin-top: 5px; margin-bottom: 20px; }
    .template6 .header .contact-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; font-size: 13px; color: #666; width: 100%;}
    .template6 .content { display: flex; gap: 40px; }
    .template6 .col-left { width: 55%; }
    .template6 .col-right { width: 45%; }
    .template6 .section-title { font-size: 18px; text-transform: uppercase; font-weight: bold; border-bottom: 2px solid #222; margin-bottom: 20px; padding-bottom: 5px; margin-top: 30px; letter-spacing: 1px;}
    .template6 .section-title:first-child { margin-top: 0; }
    .template6 .job-title { font-size: 18px; font-weight: 400; color: #333; }
    .template6 .job-company { font-size: 15px; font-weight: bold; color: #ff7f66; margin-top: 2px; }
    .template6 .job-meta { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin: 5px 0 10px; }
    .template6 p, .template6 ul { font-size: 13px; line-height: 1.6; color: #444; }
    .template6 ul { padding-left: 15px; margin-bottom: 30px;}
    .template6 ul li { margin-bottom: 5px; }
    .template6 .edu-degree { font-size: 15px; font-weight: bold; margin-bottom: 2px; color: #333; }
    .template6 .edu-school { color: #ff7f66; font-weight: bold; font-size: 14px; margin-top: 2px; margin-bottom: 5px; }

    @media print {
      body {
        background: #fff;
        padding: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .resume {
        box-shadow: none;
        margin: 0;
        max-width: 100% !important;
        border-radius: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .controls {
        display: none !important;
      }
    }
  </style>
</head>

<body>

<div class="controls" style="text-align: center; margin-bottom: 20px;">
  <button onclick="window.print()" style="padding: 12px 24px; font-size:16px; font-weight:bold; background-color:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
    📥 Download as PDF
  </button>
  <button onclick="window.location.href='dashboard.html'" style="padding: 12px 24px; font-size:16px; font-weight:bold; background-color:#6c757d; color:white; border:none; border-radius:5px; cursor:pointer; margin-left:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
    Back to Dashboard
  </button>
</div>

<div id="resumeBox"></div>

<script>
(async function() {
const urlParams = new URLSearchParams(window.location.search);
const mockTemplate = urlParams.get('mock');
let data;
if (mockTemplate) {
  // We are rendering a thumbnail! Hide controls and inject exact mock data.
  document.querySelector('.controls').style.display = 'none';
  document.body.style.padding = '0';
  document.body.style.background = 'white';

  if (mockTemplate === 'template1') {
      data = {
          template: "template1",
          firstName: "Samira", lastName: "Alcaraz", profession: "Mechanical Engineer",
          phone: "+123-456-7890", email: "hello@reallygreatsite.com", portfolio: "www.reallygreatsite.com",
          address: "123 Anywhere St., Any City",
          eduSchool: "North State University", eduDates: "2025-2027", eduDegree: "Master of Science in Mechanical Engineering",
          jobCompany: "The Innovation Lab", jobDates: "2030-2035", jobTitle: "Research Engineer",
          jobDesc: "Spearheaded the development of advanced materials.\\nConducted comprehensive experiments.",
          certName: "Project Management", certIssuer: "Project Management Institute", certYear: "2027"
      };
  } else if (mockTemplate === 'template2') {
      data = {
          template: "template2",
          firstName: "Adeline", lastName: "Palmerston", profession: "Graphics Designer",
          phone: "+123-456-7890", email: "hello@reallygreatsite.com", address: "123 Anywhere St., Any City",
          profileSummary: "Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
          skills: "Web Design, Branding, Graphic Design", languages: "English, French",
          eduSchool: "WARDIERE UNIVERSITY", eduDates: "2011-2015", eduDegree: "Bachelor of Design",
          jobCompany: "Fauget studio", jobDates: "2020-2024", jobTitle: "SENIOR GRAPHIC DESIGNER",
          jobDesc: "Create more than 100 graphic designs for big companies.\\nComplete complicated work."
      };
  } else {
      data = {
          template: mockTemplate,
          firstName: "Isabel", lastName: "Schumacher", profession: "Graphics Designer",
          phone: "+123-456-7890", email: "hello@reallygreatsite.com", address: "123 Anywhere St., Any City",
          profileSummary: "Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
          skills: "Web Design, Branding, Graphic Design", languages: "English, French",
          eduSchool: "WARDIERE UNIVERSITY", eduDates: "2011-2015", eduDegree: "Bachelor of Design",
          jobCompany: "Fauget studio", jobDates: "2020-2024", jobTitle: "SENIOR GRAPHIC DESIGNER",
          jobDesc: "Create more than 100 graphic designs for big companies.\\nComplete complicated work."
      };
  }
} else {
  let user = localStorage.getItem("loggedInUser");

  if (!user) {
    document.getElementById("resumeBox").innerHTML = "Please login first!";
    return;
  }

  try {
    const apiBaseUrl = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
    let res = await fetch(apiBaseUrl + '/api/resumes/' + user);
    let result = await res.json();
    if(result.success && result.resumes && result.resumes.length > 0) {
        let viewIndex = parseInt(localStorage.getItem("viewResumeIndex"));
        if (isNaN(viewIndex) || viewIndex >= result.resumes.length || viewIndex < 0) {
            viewIndex = result.resumes.length - 1;
        }
        data = result.resumes[viewIndex];
    } else {
        let resumesList = JSON.parse(localStorage.getItem("resumes_" + user)) || [];
        let viewIndex = parseInt(localStorage.getItem("viewResumeIndex"));
        if (resumesList.length > 0) {
            if (isNaN(viewIndex) || viewIndex >= resumesList.length || viewIndex < 0) viewIndex = resumesList.length - 1;
            data = resumesList[viewIndex];
        } else {
            data = JSON.parse(localStorage.getItem("resume_" + user));
        }
    }
  } catch(err) {
    console.warn("Backend unreachable. Loading local backup...");
    let resumesList = JSON.parse(localStorage.getItem("resumes_" + user)) || [];
    let viewIndex = parseInt(localStorage.getItem("viewResumeIndex"));
    if (resumesList.length > 0) {
        if (isNaN(viewIndex) || viewIndex >= resumesList.length || viewIndex < 0) viewIndex = resumesList.length - 1;
        data = resumesList[viewIndex];
    } else {
        data = JSON.parse(localStorage.getItem("resume_" + user));
    }
  }
}

if (!data) {
  document.getElementById("resumeBox").innerHTML = "No resume found!";
} else {

  let template = data.template;

  // ===== TEMPLATE 1 =====
  if (template === "template1") {
    document.getElementById("resumeBox").innerHTML = `
      <div class="resume simple">
        <h1>${data.firstName || 'Full'} ${data.lastName || 'Name'}</h1>
        <div class="contact-info">
          ${data.email || 'yourname@example.com'} • ${data.phone || '(123) 456-7890'} • ${data.portfolio || 'www.reallygreatsite.com'}
        </div>

        <div class="section-title">Education</div>
        <div class="item-header">
          <div class="item-title">${data.eduSchool || 'College, location'}</div>
          <div class="item-date">${data.eduDates || 'Graduation year'}</div>
        </div>
        <div class="item-subtitle" style="margin-top: 5px;">${data.eduDegree || 'Bachelor of Arts, Degree, GPA'}</div>
        <div style="font-style: italic; font-size: 14px;">Relevant course work: </div>

        <div class="section-title" style="margin-top: 30px;">Professional Experience</div>
        <div class="item-header">
          <div class="item-title">${data.jobCompany || 'Company, location'}</div>
          <div class="item-date">${data.jobDates || 'Month Year'}</div>
        </div>
        <div class="item-subtitle">${data.jobTitle || 'Role'}</div>
        <ul class="item-desc">
          ${data.jobDesc ? data.jobDesc.split('\\n').filter(s=>s.trim()).map(s => `<li>${s.trim()}</li>`).join('') : '<li>Describe what you did and what your impact was</li><li>Remember to be concise</li>'}
        </ul>

        <div class="section-title" style="margin-top: 30px;">Certificates</div>
        ${data.certName ? `
        <div class="item-header">
          <div class="item-title">${data.certName}</div>
          <div class="item-date">${data.certYear || ''}</div>
        </div>
        <div class="item-subtitle">${data.certIssuer || ''}</div>` : `
        <div class="item-header">
          <div class="item-title">Project Management</div>
          <div class="item-date">2027</div>
        </div>
        <div class="item-subtitle">The Project Management Institute</div>`}

        <div class="section-title" style="margin-top: 30px;">Skills</div>
        <div class="skills-text">
          <b>Programming languages:</b> ${data.skills || 'List programming languages or skills'} <br><br>
          <b>Computer software/ frameworks:</b> ${data.languages || 'Microsoft office, Adobe Photoshop, Maple, Git, React, jQuery'} <br><br>
          <b>Other:</b> ${data.hobbies || 'List other skills'}
        </div>
      </div>
    `;
  }

  // ===== TEMPLATE 2 =====
  else if (template === "template2") {
    const listMakerModern = (str) => {
      if(!str) return '';
      let parts = str.split(',').filter(s=>s.trim());
      let html = '';
      parts.forEach(p => html += `<div>${p.trim()}</div>`);
      return html;
    };

    document.getElementById("resumeBox").innerHTML = `
      <div class="resume modern">
        <h1>${data.firstName || 'Chanchal'} ${data.lastName || 'Sharma'}</h1>
        <div class="profession-title">${data.profession || 'Office Manager'}</div>
        
        <div class="contact-bar">
          <span>${data.email || 'chanchals@example.com'}</span>
          <span>${data.phone || '(718) 555-0100'}</span>
          <span>${data.address || '123 Anywhere Street, Any City'}</span>
        </div>

        <div class="section-heading">Experience</div>
        <div class="job-item">
          <div class="job-date">${data.jobDates || 'January 20xx - Current'}</div>
          <div class="job-title"><b>${data.jobTitle || 'Office manager'}</b>, <i>${data.jobCompany || 'The Phone Company'}</i></div>
          <div class="job-desc">
            ${data.jobDesc ? data.jobDesc.replace(/\\n/g, '<br/>') : 'Summarize your key responsibilities and accomplishments. Where appropriate, use the language and words you find in the specific job description. Be concise, targeting 3-5 key areas.'}
          </div>
        </div>
        <div class="divider"></div>

        <div class="section-heading">Education</div>
        <div class="job-item">
          <div class="job-date">${data.eduDates || 'Sep 20xx - May 20xx'}</div>
          <div class="job-title"><b>${data.eduDegree || 'Associate degree'}</b>, ${data.eduSchool || 'H.R. Management, Bellows College'}</div>
        </div>
        <div class="divider"></div>

        <div class="section-heading">Skills</div>
        <div class="skills-grid">
          ${listMakerModern(data.skills) || '<div>Project management</div><div>Data analysis</div><div>Communication</div><div>Organization</div><div>Problem-solving</div><div>Management</div>'}
        </div>
      </div>
    `;
  }

  // ===== TEMPLATE 3 =====
  // ===== TEMPLATE 3 =====
  else if (template === "template3") {
    const listMaker = (str) => str ? str.split(',').filter(s=>s.trim()).map(s => `<li>${s.trim()}</li>`).join('') : '<li>Not provided</li>';
    const descMaker = (str) => str ? str.split('\\n').filter(s=>s.trim()).map(s => `<li>${s.trim()}</li>`).join('') : '<li>No description provided.</li>';

    document.getElementById("resumeBox").innerHTML = `
      <div class="resume professional">
        <div class="left">
          ${data.photo ? `
          <div class="photo-container">
            <img src="${data.photo}">
