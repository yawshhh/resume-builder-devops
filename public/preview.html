<!DOCTYPE html>
<html>
<head>
  <title>Resume Preview</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      padding: 30px;
    }

    .resume {
      max-width: 900px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1, h2, h3 {
      margin-bottom: 8px;
    }

    p {
      margin: 5px 0;
      color: #555;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 15px 0;
    }

    /* ===== TEMPLATE 1 (Classic Simple) ===== */
    .simple {
      background: #fff;
      color: #000;
      padding: 40px;
      font-family: 'Arial', sans-serif;
      text-align: left;
    }
    .simple h1 {
      font-size: 38px;
      font-weight: normal;
      margin-bottom: 5px;
      text-align: left;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .simple .contact-info {
      font-size: 13px;
      margin-bottom: 25px;
      text-align: left;
    }
    .simple .section-title {
      font-size: 15px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 25px;
      margin-bottom: 8px;
      border-bottom: 1px solid #000;
      padding-bottom: 3px;
      color: #000;
    }
    .simple .item-header {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
    }
    .simple .item-title {
      font-weight: bold;
    }
    .simple .item-date {
      font-weight: bold;
    }
    .simple .item-subtitle {
      font-style: italic;
      font-size: 14px;
      margin-bottom: 5px;
    }
    .simple .item-desc {
      font-size: 13px;
      margin-top: 5px;
      margin-bottom: 10px;
      padding-left: 20px;
    }
    .simple .item-desc li {
      margin-bottom: 4px;
    }
    .simple .skills-text {
      font-size: 14px;
      margin-top: 10px;
      line-height: 1.6;
    }

    /* ===== TEMPLATE 2 (Minimalist Modern) ===== */
    .modern {
      background: #fff;
      color: #333;
      padding: 40px;
      font-family: 'Times New Roman', Georgia, serif;
    }
    .modern h1 {
      font-size: 44px;
      font-weight: bold;
      margin-bottom: 5px;
      text-transform: capitalize;
      line-height: 1.1;
    }
    .modern .profession-title {
      font-size: 15px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 25px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .modern .contact-bar {
      display: flex;
      justify-content: space-between;
      border-top: 2px solid #555;
      border-bottom: 2px solid #555;
      padding: 12px 0;
      margin-bottom: 35px;
      font-size: 13px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .modern .section-heading {
      font-size: 17px;
      font-weight: bold;
      text-transform: uppercase;
      margin-top: 25px;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }
    .modern .job-date {
      font-size: 13px;
      margin-bottom: 4px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .modern .job-title {
      font-size: 15px;
      margin-bottom: 10px;
    }
    .modern .job-desc {
      font-size: 14px;
      line-height: 1.6;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin-bottom: 15px;
      color: #444;
    }
    .modern .divider {
      width: 100px;
      border-top: 1px solid #777;
      margin: 25px 0;
    }
    .modern .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      font-size: 14px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ===== TEMPLATE 3 (Corporate Professional) ===== */
    .professional {
      display: flex;
      padding: 0;
      color: #333;
      border-radius: 0;
    }

    .professional .left {
      width: 35%;
      background-color: #28323c;
      color: #fff;
      padding: 40px 20px;
      text-align: center;
    }

    .professional .left h1 {
      color: #fff;
      font-size: 24px;
      margin-top: 15px;
      margin-bottom: 5px;
      border: none;
      padding-bottom: 0;
    }

    .professional .left .profession-title {
      color: #6c98c6;
      font-size: 16px;
      margin-bottom: 30px;
    }

    .professional .left .photo-container {
      width: 150px;
      height: 150px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 3px solid #6c98c6;
      overflow: hidden;
      background: #eee;
    }
    .professional .left .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .professional .left .section {
      text-align: left;
      margin-top: 30px;
    }

    .professional .left .section h3 {
      font-size: 18px;
      border-bottom: 2px solid #555;
      padding-bottom: 5px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .professional .left .info-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .professional .left ul {
      list-style-type: circle;
      padding-left: 20px;
      font-size: 14px;
    }
    .professional .left ul li {
      margin-bottom: 8px;
    }

    .professional .right {
      width: 65%;
      background-color: #fff;
      padding: 40px;
    }

    .professional .right h2 {
      font-size: 22px;
      color: #222;
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
      margin-bottom: 15px;
      margin-top: 30px;
      text-transform: uppercase;
    }

    .professional .right h2:first-child {
      margin-top: 0;
    }

    .professional .right p {
      font-size: 14px;
      line-height: 1.6;
    }

    .professional .right .job, .professional .right .degree {
      margin-top: 20px;
    }
    .professional .right .job-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }
    .professional .right .job-title {
      font-weight: bold;
      font-size: 16px;
      color: #111;
    }
    .professional .right .job-company {
      font-style: italic;
      color: #555;
      font-size: 14px;
    }
    .professional .right .job-date {
      font-size: 13px;
      color: #777;
    }
    .professional .right ul {
      margin-top: 10px;
      padding-left: 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .resume {
        box-shadow: none;
        margin: 0;
        max-width: 100% !important;
        border-radius: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .controls {
        display: none !important;
      }
    }
  </style>
</head>

<body>

<div class="controls" style="text-align: center; margin-bottom: 20px;">
  <button onclick="window.print()" style="padding: 12px 24px; font-size:16px; font-weight:bold; background-color:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
    📥 Download as PDF
  </button>
  <button onclick="window.location.href='dashboard.html'" style="padding: 12px 24px; font-size:16px; font-weight:bold; background-color:#6c757d; color:white; border:none; border-radius:5px; cursor:pointer; margin-left:10px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
    Back to Dashboard
  </button>
</div>

<div id="resumeBox"></div>

<script>
(async function() {
let user = localStorage.getItem("loggedInUser");

if (!user) {
  document.getElementById("resumeBox").innerHTML = "Please login first!";
  return;
}

let data;
try {
  let res = await fetch('/api/resumes/' + user);
  let result = await res.json();
  if(result.success && result.resumes && result.resumes.length > 0) {
      let viewIndex = parseInt(localStorage.getItem("viewResumeIndex"));
      if (isNaN(viewIndex) || viewIndex >= result.resumes.length || viewIndex < 0) {
          viewIndex = result.resumes.length - 1;
      }
      data = result.resumes[viewIndex];
  } else {
      let resumesList = JSON.parse(localStorage.getItem("resumes_" + user)) || [];
      let viewIndex = parseInt(localStorage.getItem("viewResumeIndex"));
      if (resumesList.length > 0) {
          if (isNaN(viewIndex) || viewIndex >= resumesList.length || viewIndex < 0) viewIndex = resumesList.length - 1;
          data = resumesList[viewIndex];
      } else {
          data = JSON.parse(localStorage.getItem("resume_" + user));
      }
  }
} catch(err) {
  console.warn("Backend unreachable. Loading local backup...");
  let resumesList = JSON.parse(localStorage.getItem("resumes_" + user)) || [];
  let viewIndex = parseInt(localStorage.getItem("viewResumeIndex"));
  if (resumesList.length > 0) {
      if (isNaN(viewIndex) || viewIndex >= resumesList.length || viewIndex < 0) viewIndex = resumesList.length - 1;
      data = resumesList[viewIndex];
  } else {
      data = JSON.parse(localStorage.getItem("resume_" + user));
  }
}

if (!data) {
  document.getElementById("resumeBox").innerHTML = "No resume found!";
} else {

  let template = data.template;

  // ===== TEMPLATE 1 =====
  if (template === "template1") {
    document.getElementById("resumeBox").innerHTML = `
      <div class="resume simple">
        <h1>${data.firstName || 'Full'} ${data.lastName || 'Name'}</h1>
        <div class="contact-info">
          ${data.email || 'yourname@example.com'} • ${data.phone || '(123) 456-7890'} • www.example.com
        </div>

        <div class="section-title">Education</div>
        <div class="item-header">
          <div class="item-title">${data.eduSchool || 'College, location'}</div>
          <div class="item-date">${data.eduDates || 'Graduation year'}</div>
        </div>
        <div class="item-subtitle" style="margin-top: 5px;">${data.eduDegree || 'Bachelor of Arts, Degree, GPA'}</div>
        <div style="font-style: italic; font-size: 14px;">Relevant course work: </div>

        <div class="section-title" style="margin-top: 30px;">Professional Experience</div>
        <div class="item-header">
          <div class="item-title">${data.jobCompany || 'Company, location'}</div>
          <div class="item-date">${data.jobDates || 'Month Year'}</div>
        </div>
        <div class="item-subtitle">${data.jobTitle || 'Role'}</div>
        <ul class="item-desc">
          ${data.jobDesc ? data.jobDesc.split('\\n').filter(s=>s.trim()).map(s => `<li>${s.trim()}</li>`).join('') : '<li>Describe what you did and what your impact was</li><li>Remember to be concise</li>'}
        </ul>

        <div class="section-title" style="margin-top: 30px;">Projects & Extracurricular</div>
        <div class="item-header">
          <div class="item-title">Project title</div>
          <div class="item-date">Month Year</div>
        </div>
        <ul class="item-desc">
          <li>Describe what you did/built etc.</li>
        </ul>

        <div class="section-title" style="margin-top: 30px;">Skills</div>
        <div class="skills-text">
          <b>Programming languages:</b> ${data.skills || 'List programming languages or skills'} <br><br>
          <b>Computer software/ frameworks:</b> ${data.languages || 'Microsoft office, Adobe Photoshop, Maple, Git, React, jQuery'} <br><br>
          <b>Other:</b> ${data.hobbies || 'List other skills'}
        </div>
      </div>
    `;
  }

  // ===== TEMPLATE 2 =====
  else if (template === "template2") {
    const listMakerModern = (str) => {
      if(!str) return '';
      let parts = str.split(',').filter(s=>s.trim());
      let html = '';
      parts.forEach(p => html += `<div>${p.trim()}</div>`);
      return html;
    };

    document.getElementById("resumeBox").innerHTML = `
      <div class="resume modern">
        <h1>${data.firstName || 'Chanchal'} ${data.lastName || 'Sharma'}</h1>
        <div class="profession-title">${data.profession || 'Office Manager'}</div>
        
        <div class="contact-bar">
          <span>${data.email || 'chanchals@example.com'}</span>
          <span>${data.phone || '(718) 555-0100'}</span>
          <span>LinkedIn profile</span>
        </div>

        <div class="section-heading">Experience</div>
        <div class="job-item">
          <div class="job-date">${data.jobDates || 'January 20xx - Current'}</div>
          <div class="job-title"><b>${data.jobTitle || 'Office manager'}</b>, <i>${data.jobCompany || 'The Phone Company'}</i></div>
          <div class="job-desc">
            ${data.jobDesc ? data.jobDesc.replace(/\\n/g, '<br/>') : 'Summarize your key responsibilities and accomplishments. Where appropriate, use the language and words you find in the specific job description. Be concise, targeting 3-5 key areas.'}
          </div>
        </div>
        <div class="divider"></div>

        <div class="section-heading">Education</div>
        <div class="job-item">
          <div class="job-date">${data.eduDates || 'Sep 20xx - May 20xx'}</div>
          <div class="job-title"><b>${data.eduDegree || 'Associate degree'}</b>, ${data.eduSchool || 'H.R. Management, Bellows College'}</div>
        </div>
        <div class="divider"></div>

        <div class="section-heading">Skills</div>
        <div class="skills-grid">
          ${listMakerModern(data.skills) || '<div>Project management</div><div>Data analysis</div><div>Communication</div><div>Organization</div><div>Problem-solving</div><div>Management</div>'}
        </div>
      </div>
    `;
  }

  // ===== TEMPLATE 3 =====
  else {
    const listMaker = (str) => str ? str.split(',').filter(s=>s.trim()).map(s => `<li>${s.trim()}</li>`).join('') : '<li>Not provided</li>';
    const descMaker = (str) => str ? str.split('\\n').filter(s=>s.trim()).map(s => `<li>${s.trim()}</li>`).join('') : '<li>No description provided.</li>';

    document.getElementById("resumeBox").innerHTML = `
      <div class="resume professional">
        <div class="left">
          ${data.photo ? `
          <div class="photo-container">
            <img src="${data.photo}">
          </div>
          ` : `
          <div class="photo-container" style="display:flex;align-items:center;justify-content:center;font-size:40px;color:#ccc;background:#3a4652">
             &#128100;
          </div>
          `}
          <h1>${data.firstName || 'Your Name'} ${data.lastName || ''}</h1>
          <div class="profession-title">${data.profession || 'Professional'}</div>

          <div class="section">
            <h3>Contact</h3>
            <div class="info-item">📞 ${data.phone || 'N/A'}</div>
            <div class="info-item">✉️ ${data.email || 'N/A'}</div>
            <div class="info-item">📍 ${data.address || ''}, ${data.city || 'N/A'}</div>
          </div>

          <div class="section">
            <h3>Skills</h3>
            <ul>
              ${listMaker(data.skills || '')}
            </ul>
          </div>
          
          <div class="section">
            <h3>Languages</h3>
            <ul>
              ${listMaker(data.languages || '')}
            </ul>
          </div>

          <div class="section">
            <h3>Hobbies</h3>
            <ul>
               ${listMaker(data.hobbies || '')}
            </ul>
          </div>
        </div>

        <div class="right">
          <h2>Profile</h2>
          <p>${data.profileSummary || ''}</p>

          <h2>Work Experience</h2>
          <div class="job">
            <div class="job-header">
              <div>
                <div class="job-title">${data.jobTitle || 'Job Title'}</div>
                <div class="job-company">${data.jobCompany || 'Company – Location'}</div>
              </div>
              <div class="job-date">${data.jobDates || 'Dates'}</div>
            </div>
            <ul>
              ${descMaker(data.jobDesc || '')}
            </ul>
          </div>

          <h2>Education</h2>
          <div class="job">
            <div class="job-header">
              <div>
                <div class="job-title">${data.eduDegree || 'Degree'}</div>
                <div class="job-company">${data.eduSchool || 'University/School'}</div>
              </div>
              <div class="job-date">${data.eduDates || 'Dates'}</div>
            </div>
          </div>

        </div>
      </div>
    `;
  }

}

})();
</script>

</body>
</html>
